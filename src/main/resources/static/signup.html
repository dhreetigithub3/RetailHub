<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join RetailHub - Create Your Account Today</title>
  <meta name="description" content="Sign up for RetailHub and start shopping for thousands of products with exclusive deals and seamless checkout." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card animate-fade-in">
      <h2>Create Account</h2>
      <p class="muted">Join RetailHub and start shopping today.</p>
      
      <form id="signupForm" novalidate>
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="johndoe" required oninput="checkUsername()"/>
          <small id="usernameError" style="color:red;font-size:12px;"></small>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required oninput="checkPassword()"/>
          <small id="passwordError" style="color:red;font-size:12px;"></small>
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
      </form>
      
      <p id="message" style="margin-top: 1rem;"></p>
      
      <div class="auth-links">
        <span>Already have an account? <a href="/login.html">Sign In</a></span>
        <a href="/">Back to Home</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
  </footer>

  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    const form = document.getElementById('signupForm');
    const usernameInput = document.getElementById('username');
    const usernameError = document.getElementById('usernameError');
    const passwordInput = document.getElementById('password');
    const passwordError = document.getElementById('passwordError');
    const messageEl = document.getElementById('message');

    if (form) {
      form.addEventListener('submit', function(event) {
        checkUsername();
        checkPassword();

        const hasUsernameError = usernameError.textContent.trim() !== '';
        const hasPasswordError = passwordError.textContent.trim() !== '';

        if (hasUsernameError || hasPasswordError) {
          event.preventDefault();
          event.stopImmediatePropagation();
          messageEl.textContent = 'Please fix the errors before submitting.';
          messageEl.style.color = 'red';
        }
      });
    }

    function checkUsername() {
      const username = usernameInput.value.trim();

      if (username.length < 6) {
        usernameError.textContent = 'Username must be at least 6 characters';
      } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        usernameError.textContent = 'Username can only contain letters, numbers, and underscores';
      } else {
        usernameError.textContent = '';
      }
    }

    function checkPassword() {
      const password = passwordInput.value;
      const errors = [];

      if (password.length < 6) {
        errors.push('6+ characters');
      }
      if (!/[A-Z]/.test(password)) {
        errors.push('uppercase');
      }
      if (!/[a-z]/.test(password)) {
        errors.push('lowercase');
      }
      if (!/[0-9]/.test(password)) {
        errors.push('number');
      }
      if (!/[@$!%*&]/.test(password)) {
        errors.push('special character');
      }

      passwordError.textContent = errors.length > 0 ? 'Must contain: ' + errors.join(', ') : '';
    }
  </script>
</body>

</html>
