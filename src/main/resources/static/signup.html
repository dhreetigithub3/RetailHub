<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join RetailHub - Create Your Account Today</title>
  <meta name="description" content="Sign up for RetailHub and start shopping for thousands of products with exclusive deals and seamless checkout." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card animate-fade-in">
      <h2>Create Account</h2>
      <p class="muted">Join RetailHub and start shopping today.</p>
      
      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="johndoe" required oninput="checkUsername()"/>
          <small id="usernameError" style="color:red;font-size:12px;"></small>
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required oninput="checkPassword()"/>
          <small id="passwordError" style="color:red;font-size:12px;"></small>
        </div>
        <button id="btnSubmit" type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
      </form>
      
      <p id="message" style="margin-top: 1rem;"></p>
      
      <div class="auth-links">
        <span>Already have an account? <a href="/login.html">Sign In</a></span>
        <a href="/">Back to Home</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
  </footer>

  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
  <script>
    btnSubmit = document.getElementById('btnSubmit');
    btnSubmit.addEventListener('click', function(event) {
      event.preventDefault();
      const usernameError = document.getElementById('usernameError').textContent;
      const passwordError = document.getElementById('passwordError').textContent;
      
      if (usernameError || passwordError) {
        document.getElementById('message').textContent = "Please fix the errors before submitting.";
        document.getElementById('message').style.color = "red";
        return;
      }
    });

    u = document.getElementById('username');
    ue = document.getElementById('usernameError');
    function checkUsername() {
      const username = u.value;
      if (username.length < 6) {
        ue.textContent = "Username must be at least 6 characters";
      } else if (!/^[a-zA-Z0-9_]+$/.test(username)) {
        ue.textContent = "Username can only contain letters, numbers, and underscores";
      } else {
        ue.textContent = "";
      }
    }
    
    p = document.getElementById('password');
    pe = document.getElementById('passwordError');

    function checkPassword() {
      const password = p.value;
      const errors = [];
      
      if (password.length < 6) {
        errors.push("At least 6 characters");
      }
      if (!/[A-Z]/.test(password)) {
        errors.push("At least one uppercase letter");
      }
      if (!/[a-z]/.test(password)) {
        errors.push("At least one lowercase letter");
      }
      if (!/[0-9]/.test(password)) {
        errors.push("At least one number");
      }
      if (!/[@$!%*&]/.test(password)) {
        errors.push("At least one special character (@$!%*&)");
      }
      
      pe.textContent = errors.length > 0 ? "Must contain: " + errors.join(", ") : "";
    }
  </script>
</body>

</html>
