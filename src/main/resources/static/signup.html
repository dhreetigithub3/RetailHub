<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Join RetailHub - Create Your Account Today</title>
  <meta name="description" content="Sign up for RetailHub and start shopping for thousands of products with exclusive deals and seamless checkout." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card animate-fade-in">
      <h2>Create Account</h2>
      <p class="muted">Join RetailHub and start shopping today.</p>
      
      <form id="signupForm">
        <div class="form-group">
          <label for="name">Full Name</label>
          <input type="text" id="name" placeholder="John Doe" required />
        </div>
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="johndoe" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" placeholder="john@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Create Account</button>
      </form>
      
      <p id="message" style="margin-top: 1rem;"></p>
      
      <div class="auth-links">
        <span>Already have an account? <a href="/login.html">Sign In</a></span>
        <a href="/">Back to Home</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
  </footer>

  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
