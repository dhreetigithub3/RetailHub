<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Manage Addresses - RetailHub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a class="brand" href="/">RetailHub</a>
            <nav class="nav">
                <!-- Managed by navbar.js -->
            </nav>
        </div>
    </header>

    <main class="auth-page" style="background: var(--bg); align-items: flex-start;">
        <div class="auth-card" style="text-align: left; max-width: 800px; margin-top: 2rem;">
            <div style="margin-bottom: 2rem; display: flex; justify-content: space-between; align-items: center;">
                <div>
                    <h1>Manage Addresses</h1>
                    <p class="text-muted">Add, edit, or remove your shipping addresses.</p>
                </div>
                <button type="button" class="btn btn-primary btn-sm" onclick="openAddressModal()">+ Add New Address</button>
            </div>

            <div id="addressList" class="address-grid">
                <!-- Addresses will be loaded here -->
            </div>

            <div style="margin-top: 3rem; text-align: center;">
                <a href="/profile.html" class="btn btn-outline">← Back to Profile</a>
            </div>
        </div>
    </main>

    <!-- Address Modal -->
    <div id="addressModal" class="address-modal">
        <div class="address-modal-content">
            <h2 id="modalTitle" style="margin-bottom: 1.5rem;">Add Address</h2>
            <form id="addressForm">
                <input type="hidden" id="addressId" />
                <div class="form-group">
                    <label for="street">Street Address</label>
                    <input type="text" id="street" required />
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="city">City</label>
                        <input type="text" id="city" required />
                    </div>
                    <div class="form-group">
                        <label for="state">State</label>
                        <input type="text" id="state" required />
                    </div>
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label for="zipCode">Zip Code</label>
                        <input type="text" id="zipCode" required />
                    </div>
                    <div class="form-group">
                        <label for="country">Country</label>
                        <input type="text" id="country" required value="India" />
                    </div>
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 1rem;">
                    <button type="submit" class="btn btn-primary">Save Address</button>
                    <button type="button" class="btn btn-outline" onclick="closeAddressModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <footer class="site-footer">
        <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/manage-addresses.js"></script>
</body>

</html>
