<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reset Your Password - RetailHub Recovery</title>
  <meta name="description" content="Recover your RetailHub account password securely using OTP verification." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card animate-fade-in">
      <h1>Reset Password</h1>
      <p class="muted">Follow the steps below to recover your account.</p>
      
      <form id="forgotPasswordForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
          <button type="button" class="btn btn-ghost btn-sm" onclick="sendOtp()" style="margin-top: 0.5rem; width: 100%;">Send OTP</button>
          <p id="otpSendMessage" style="font-size: 0.8rem; margin-top: 0.5rem;"></p>
        </div>

        <div id="verifyOtpSection" style="display: none; margin-top: 1.5rem;">
          <div class="form-group">
            <label for="otp">Verification Code</label>
            <input type="text" id="otp" placeholder="Enter 6-digit OTP" />
            <button type="button" class="btn btn-ghost btn-sm" onclick="verifyOtp()" style="margin-top: 0.5rem; width: 100%;">Verify OTP</button>
            <p id="otpVerifyMessage" style="font-size: 0.8rem; margin-top: 0.5rem;"></p>
          </div>
        </div>

        <div id="resetPasswordSection" style="display: none; margin-top: 1.5rem;">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input type="password" id="newPassword" placeholder="••••••••" />
          </div>
          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input type="password" id="confirmPassword" placeholder="••••••••" />
          </div>
          <button type="button" class="btn-primary" onclick="resetPassword()" style="width: 100%;">Reset Password</button>
        </div>

        <p id="resetPasswordMessage" style="margin-top: 1rem;"></p>
      </form>
      
      <div class="auth-links">
        <a href="/login.html">Back to Sign In</a>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
  </footer>

  <script src="/js/navbar.js"></script>
  <script src="/js/otp.js"></script>
</body>

</html>
