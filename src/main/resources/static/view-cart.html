<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Your Shopping Cart - RetailHub</title>
  <meta name="description"
    content="Review the items in your cart, adjust quantities, and proceed to secure checkout on RetailHub." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@400;500;600;700;800&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/customer.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main>
    <div class="wide-container animate-fade-in">
      <div style="margin-bottom: 2rem;">
        <h1>Your Shopping Cart</h1>
        <p class="text-muted">Review your items before checkout.</p>
      </div>

      <div id="cartGrid" style="display: grid; grid-template-columns: 2fr 1fr; gap: 2rem;">
        <div class="card" style="padding: 0; overflow: hidden;">
          <div id="cartItems" style="padding: 24px; display: grid; gap: 1rem;">
            <div style="text-align: center; padding: 3rem;">
              <div class="text-muted">Your cart is empty. <a href="/">Go shopping!</a></div>
            </div>
          </div>
        </div>

        <div id="orderSummaryCard" class="card">
          <h3 style="margin-bottom: 1.5rem;">Order Summary</h3>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span class="text-secondary">Subtotal</span>
            <span id="cartSubtotal" style="font-weight: 600;">₹0.00</span>
          </div>
          <div style="display: flex; justify-content: space-between; margin-bottom: 1rem;">
            <span class="text-secondary">Shipping</span>
            <span style="color: var(--success); font-weight: 600;">FREE</span>
          </div>
          <hr />

          <div style="margin: 1.5rem 0;">
            <h4
              style="margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">
              Delivery Address</h4>
            
            <div id="savedAddressesContainer" style="margin-bottom: 1rem; display: none;">
              <select id="savedAddressSelect" class="card" style="width: 100%; padding: 0.75rem; margin-bottom: 0.5rem; border: 1px solid var(--border);">
                <option value="new">-- Use a new address --</option>
              </select>
            </div>

            <div id="newAddressForm">
              <div style="display: grid; gap: 0.75rem;">
                <input type="text" id="street" placeholder="Street Address" class="card" style="padding: 0.75rem; margin: 0; border: 1px solid var(--border);" />
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                  <input type="text" id="city" placeholder="City" class="card" style="padding: 0.75rem; margin: 0; border: 1px solid var(--border);" />
                  <input type="text" id="state" placeholder="State" class="card" style="padding: 0.75rem; margin: 0; border: 1px solid var(--border);" />
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem;">
                  <input type="text" id="zipCode" placeholder="Zip Code" class="card" style="padding: 0.75rem; margin: 0; border: 1px solid var(--border);" />
                  <input type="text" id="country" placeholder="Country" class="card" style="padding: 0.75rem; margin: 0; border: 1px solid var(--border);" value="India" />
                </div>
                <label style="display: flex; align-items: center; gap: 0.5rem; cursor: pointer; font-size: 0.875rem;">
                  <input type="checkbox" id="saveAddress" checked />
                  Save this address for future reference
                </label>
              </div>
            </div>
          </div>

          <hr />

          <div style="margin: 1.5rem 0;">
            <h4
              style="margin-bottom: 1rem; font-size: 0.9rem; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);">
              Payment Method</h4>
            <div style="display: grid; gap: 0.75rem;">
              <label class="card"
                style="padding: 1rem; cursor: pointer; display: flex; align-items: center; gap: 1rem; margin: 0; border-color: var(--primary);">
                <input type="radio" name="paymentMethod" value="PREPAID" checked />
                <div>
                  <div style="font-weight: 600;">Online Payment</div>
                </div>
              </label>
              <label class="card"
                style="padding: 1rem; cursor: pointer; display: flex; align-items: center; gap: 1rem; margin: 0;">
                <input type="radio" name="paymentMethod" value="COD" />
                <div>
                  <div style="font-weight: 600;">Cash on Delivery</div>
                </div>
              </label>
            </div>
          </div>

          <div style="display: flex; justify-content: space-between; margin-bottom: 2rem;">
            <span style="font-weight: 700; font-size: 1.25rem;">Total</span>
            <span id="cartTotal" style="font-weight: 800; font-size: 1.25rem; color: var(--primary);">₹0.00</span>
          </div>
          <button id="checkoutBtn" class="btn-primary" style="width: 100%;" onclick="checkout()">Place Order</button>
          <a href="/" class="btn btn-ghost" style="width: 100%; margin-top: 1rem;">Continue Shopping</a>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
  </footer>

  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="/js/navbar.js"></script>
  <script src="/js/customer.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", () => {
      if (ensureCustomer()) {
        loadCart();
        loadSavedAddresses();
      }
    });

    // Visual feedback for radio selection
    document.querySelectorAll('input[name="paymentMethod"]').forEach(radio => {
      radio.addEventListener('change', (e) => {
        document.querySelectorAll('input[name="paymentMethod"]').forEach(r => {
          r.closest('.card').style.borderColor = 'var(--border)';
        });
        if (e.target.checked) {
          e.target.closest('.card').style.borderColor = 'var(--primary)';
        }
      });
    });
  </script>
</body>

</html>
