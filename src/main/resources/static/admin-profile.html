<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin Profile - RetailHub</title>
    <meta name="description" content="View and manage your RetailHub account details and preferences." />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body data-admin-profile="true">
    <header class="site-header">
        <div class="header-container">
            <a class="brand" href="/admin-home.html">RetailHub</a>
            <nav class="nav">
                <!-- Managed by navbar.js -->
            </nav>
        </div>
    </header>

    <main>
        <div class="wide-container animate-fade-in" style="max-width: 600px; margin: 0px auto;">
            <div style="margin-bottom: 2.5rem; text-align: center;">
                <h1>Admin Profile</h1>
                <p class="text-muted">Manage your personal information and account settings.</p>
            </div>

            <div class="card" style="padding: 3rem;">
                <div style="display: flex; flex-direction: column; align-items: center; margin-bottom: 3rem;">
                    <div style="width: 100px; height: 100px; background: var(--primary-glow); color: var(--primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 800; margin-bottom: 1rem;"
                        id="profileInitial">
                        A
                    </div>
                    <h2 id="profileNameDisplay" style="margin: 0;">Admin Name</h2>
                    <div id="profileRoleBadge" class="hero-badge" style="margin-top: 0.5rem;">ADMIN</div>
                </div>

                <div style="display: grid; gap: 1.5rem;">
                    <div
                        style="display: grid; grid-template-columns: 1fr 2fr; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light);">
                        <div class="text-muted"
                            style="font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">
                            Full Name</div>
                        <div id="profileFullName" style="font-weight: 600; font-size: 1rem;">-</div>
                    </div>

                    <div
                        style="display: grid; grid-template-columns: 1fr 2fr; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light);">
                        <div class="text-muted"
                            style="font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">
                            Username</div>
                        <div id="profileUsername" style="font-weight: 600; font-size: 1rem;">-</div>
                    </div>

                    <div
                        style="display: grid; grid-template-columns: 1fr 2fr; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light);">
                        <div class="text-muted"
                            style="font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">
                            Email Address</div>
                        <div id="profileEmail" style="font-weight: 600; font-size: 1rem;">-</div>
                    </div>

                    <div
                        style="display: grid; grid-template-columns: 1fr 2fr; align-items: center; padding-bottom: 1rem; border-bottom: 1px solid var(--border-light);">
                        <div class="text-muted"
                            style="font-weight: 600; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.05em;">
                            Mobile Number</div>
                        <div id="profileMobile" style="font-weight: 600; font-size: 1rem;">-</div>
                    </div>

                    <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
                        <a href="/admin-home.html" class="btn btn-ghost">Admin Dashboard</a>
                        <a id="adminEditBtn" href="/edit-user-admin.html" class="btn btn-primary">Edit Profile</a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/profile.js"></script>
</body>

</html>
