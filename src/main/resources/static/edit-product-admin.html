<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit Product Details - RetailHub Inventory</title>
  <meta name="description"
    content="Update product specifications, pricing, and stock levels in the RetailHub catalog." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/admin-home.html">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main>
    <div class="container animate-fade-in" style="max-width: 600px; margin: 0px auto;">
      <div style="margin-bottom: 2rem;">
        <a href="/all-products-admin.html" class="btn btn-ghost btn-sm" style="margin-bottom: 1rem;">← Back to List</a>
        <h1>Edit Product</h1>
        <p class="text-muted">Modify the details for this product.</p>
      </div>

      <div class="card">
        <form id="editProductForm">
          <input type="hidden" id="productId" />
          <div class="form-group">
            <label for="name">Product Name</label>
            <input type="text" id="name" placeholder="e.g. Wireless Headphones" required />
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
            <div class="form-group">
            <label for="brand">Brand Name</label>
            <input type="text" id="brand" placeholder="e.g. SONY, APPLE" required />
          </div>
            <div class="form-group">
              <label for="category">Category</label>
              <select id="category" required>
                <option value="">Select a category</option>
                <option value="Electronics">Electronics</option>
                <option value="Fashion">Fashion</option>
                <option value="Home Living">Home & Living</option>
                <option value="Beauty">Beauty & Health</option>
                <option value="Groceries">Groceries</option>
                <option value="Sports">Sports</option>
                <option value="Toys">Toys</option>
                <option value="Accessories">Accessories</option>
              </select>
            </div>
          </div>

          <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 1rem;">
            <div class="form-group">
              <label for="actualPrice">Actual Price (₹)</label>
              <input type="number" id="actualPrice" placeholder="0.00" step="0.01" />
            </div>
            <div class="form-group">
              <label for="price">Discount Price (₹)</label>
              <input type="number" id="price" placeholder="0.00" step="0.01" required />
            </div>
            <div class="form-group">
              <label for="stock">Stock Quantity</label>
              <input type="number" id="stock" placeholder="0" required />
            </div>
          </div>

          <div class="form-group">
            <label for="imageUrl">Image URL</label>
            <input type="url" id="imageUrl" placeholder="https://example.com/image.jpg" />
          </div>

          <div class="form-group">
            <label for="description">Description</label>
            <textarea id="description" rows="4" placeholder="Tell more about the product..."></textarea>
          </div>

          <div class="form-group">
            <label for="tags">Tags / Keywords</label>
            <textarea id="tags" rows="2" placeholder="Example: laptop, gaming, asus, ryzen, 16GB RAM"></textarea>
          </div>

          <button type="submit" class="btn-primary" style="width: 100%; margin-top: 1rem;">Update Product</button>
        </form>
        <p id="message" style="margin-top: 1rem; text-align: center;"></p>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub Admin. All rights reserved.</div>
  </footer>

  <script src="/js/navbar.js"></script>
  <script src="/js/admin-products.js"></script>
</body>

</html>
