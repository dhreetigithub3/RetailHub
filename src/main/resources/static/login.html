<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign In to Your Account - RetailHub</title>
  <meta name="description" content="Access your RetailHub account to manage your orders, track shipments, and explore new deals." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main class="auth-page">
    <div class="auth-card animate-fade-in">
      <h1>Welcome Back</h1>
      <p class="muted">Sign in to your RetailHub account</p>
      
      <form id="loginForm">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" placeholder="Enter your username" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" placeholder="Enter your password" required />
        </div>
        <button type="submit" class="btn-primary" style="width: 100%;">Sign In</button>
      </form>
      
      <p id="message" style="margin-top: 1rem;"></p>
      
      <div class="auth-links">
        <a href="/forgot-password.html">Forgot Password?</a>
        <span>New here? <a href="/signup.html">Create Account</a></span>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
  </footer>

  <script src="/js/navbar.js"></script>
  <script src="/js/auth.js"></script>
</body>

</html>
