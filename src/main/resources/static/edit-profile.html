<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Edit Profile - RetailHub</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
    <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
    <header class="site-header">
        <div class="header-container">
            <a class="brand" href="/">RetailHub</a>
            <nav class="nav">
                <!-- Managed by navbar.js -->
            </nav>
        </div>
    </header>

    <main class="auth-page" style="background: var(--bg);">
        <div class="auth-card" style="text-align: left; max-width: 550px;">
            <div style="margin-bottom: 2rem; text-align: center;">
                <h1>Edit Profile</h1>
                <p class="text-muted">Update your account information below.</p>
            </div>

            <form id="editProfileForm">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" required placeholder="Enter your full name" />
                </div>
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" required placeholder="Choose a unique username" />
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" required placeholder="Enter your email" />
                </div>
                <div class="form-group">
                    <label for="password">New Password (leave blank to keep current)</label>
                    <input type="password" id="password" placeholder="Min 6 characters" />
                </div>

                <div id="message" style="margin-bottom: 1.5rem; font-size: 0.9rem; text-align: center;"></div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <button type="submit" class="btn btn-primary">Save Changes</button>
                    <a href="/profile.html" class="btn btn-outline">Cancel</a>
                </div>
            </form>
        </div>
    </main>

    <footer class="site-footer">
        <div class="footer-bottom">&copy; 2026 RetailHub. All rights reserved.</div>
    </footer>

    <script src="/js/navbar.js"></script>
    <script src="/js/edit-profile.js"></script>
</body>

</html>
