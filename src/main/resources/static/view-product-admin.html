<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Product Details - RetailHub Admin View</title>
  <meta name="description"
    content="View comprehensive product details, stock history, and management options for administrators." />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  <link rel="stylesheet" href="/css/style.css" />
  <script src="/js/auth-guard.js"></script>
</head>

<body>
  <header class="site-header">
    <div class="header-container">
      <a class="brand" href="/admin-home.html">RetailHub</a>
      <nav class="nav">
        <!-- Managed by navbar.js -->
      </nav>
    </div>
  </header>

  <main>
    <div class="wide-container animate-fade-in">
      <div style="margin-bottom: 2rem;">
        <a href="/all-products-admin.html" class="btn btn-ghost btn-sm" style="margin-bottom: 1rem;">← Back to List</a>
        <!-- <h1 id="productName">Product Details</h1> -->
      </div>

      <div class="card" style="display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; align-items: start;">
        <div>
          <img id="productImage" src="/static/img/placeholder.png" alt="Product Image"
            style="width: 100%; border-radius: var(--radius-lg); box-shadow: var(--shadow);" />
        </div>
        <div>
          <div id="productCategory" class="hero-badge" style="margin-bottom: 1rem;">Category</div>
          <h2 id="productTitle" style="margin-bottom: 1.5rem;">Product Name</h2>
          <div id="productPriceContainer" style="margin-bottom: 1.5rem;">
            <div style="display: flex; align-items: center; gap: 1rem;">
              <div id="productPrice" style="font-size: 2.5rem; font-weight: 800; color: var(--primary);">₹0.00</div>
              <div id="productActualPrice" style="font-size: 1.25rem; text-decoration: line-through; color: var(--text-muted); display: none;">₹0.00</div>
              <div id="productDiscountBadge" class="hero-badge" style="background: var(--error); color: white; display: none;">0% OFF</div>
            </div>
            <div id="productSavings" style="color: var(--success); font-weight: 700; margin-top: 0.5rem; display: none;">You save ₹0.00</div>
          </div>

          <div style="margin-bottom: 2rem;">
            <h3 style="font-size: 1rem; margin-bottom: 0.5rem;">Description</h3>
            <p id="productDescription" class="text-secondary">No description available for this product.</p>
          </div>

          <div
            style="display: flex; align-items: center; gap: 2rem; margin-bottom: 2.5rem; padding: 1rem; background: var(--bg); border-radius: var(--radius);">
            <div>
              <div class="text-muted" style="font-size: 0.75rem; text-transform: uppercase;">Stock Level</div>
              <div id="productStock" style="font-weight: 700; font-size: 1.25rem;">0 units</div>
            </div>
            <div>
              <div class="text-muted" style="font-size: 0.75rem; text-transform: uppercase;">Product ID</div>
              <div id="productIdText" style="font-weight: 700; font-size: 1.25rem;">#0</div>
            </div>
          </div>

          <div style="display: flex; gap: 1rem;">
            <a id="editLink" href="#" class="btn btn-primary btn-lg" style="flex: 1;">Edit Details</a>
            <button onclick="deleteProduct()" class="btn btn-outline btn-lg"
              style="color: var(--error); border-color: var(--error);">Delete Product</button>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="site-footer">
    <div class="footer-bottom">&copy; 2026 RetailHub Admin. All rights reserved.</div>
  </footer>

  <script src="/js/navbar.js"></script>
  <script src="/js/admin-products.js"></script>
</body>

</html>
